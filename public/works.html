<!DOCTYPE html>
<html lang="th">

<head>

  <meta name="description"

  <link rel="icon"

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/works.css">
</head>

<body>

  <div class="bg-decorations">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>

  <!-- Navigation -->
  <nav class="nav" id="mainNav">
    <a href="/" class="nav-logo">
      <span class="logo-icon">🎨</span>
      <span>IframeXeno</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">✦ Home</a></li>
      <li><a href="/works" class="active">🖼 Works</a></li>
      <li><a href="/admin"> IframeXeno </a></li>
    </ul>
  </nav>

  <main class="page-content">
    <div class="works-header">
      <h1>🖼 ผลงานของฉัน</h1>
      <p>รวมผลงานศิลปะ ภาพประกอบ และงานออกแบบ</p>

    <!-- Tag Filters -->
    <div class="tag-filters" id="tagFilters">
      <button class="tag-btn active" data-tag="all">✦ ทั้งหมด</button>

    <!-- Works Grid -->
    <div class="works-grid" id="worksGrid">

  <footer class="footer">
    <p>Made with 💜 by IframeXeno · © 2026</p>
